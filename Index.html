<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Seleira 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Quicksand',sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(to bottom,#fff0f5,#ffe4e1,#fff);
overflow-x:hidden;
color:#444;
cursor:none;
}

/* LOADING SCREEN */
#loader{
position:fixed;
inset:0;
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
transition:1s;
}

#loader h1{
font-size:2rem;
color:#ff4f81;
}

#loader p{
margin-top:10px;
font-size:1.1rem;
}

.fade-out{
opacity:0;
visibility:hidden;
}

/* CURSOR TRAIL */
.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
pointer-events:none;
background:rgba(255,79,129,.7);
box-shadow:0 0 20px rgba(255,79,129,.8);
transform:translate(-50%,-50%);
z-index:999;
}

.trail{
position:fixed;
font-size:18px;
pointer-events:none;
animation:trailFade 1s linear forwards;
}

@keyframes trailFade{
to{
opacity:0;
transform:translateY(-20px) scale(0.5);
}
}

section{
min-height:100vh;
padding:60px 20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h1,h2{
color:#ff4f81;
}

.final-buttons{
margin-top:30px;
position:relative;
height:150px;
width:300px;
}

.yes-btn,.no-btn{
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
position:absolute;
}

.yes-btn{
left:30px;
background:#ff4f81;
color:white;
}

.no-btn{
right:30px;
background:#ddd;
}

.success{
display:none;
margin-top:30px;
font-size:1.5rem;
color:#ff4f81;
font-weight:bold;
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
<h1>Jhian & Seleira 💖</h1>
<p>Loading our little universe...</p>
</div>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<section>
<h1>Hi Seleira! 💖</h1>
<p>Welcome to our little universe</p>
<p>A special place filled with love, memories, and magic ✨</p>
</section>

<section>
<h2>Can I court you, Seleira Milan? ✨</h2>
<p>Thank you for being you. I love you, my Seleira.</p>

<div class="final-buttons">
<button class="yes-btn" onclick="sayYes()">Yes 💖</button>
<button class="no-btn" id="noBtn">No 😝</button>
</div>

<div class="success" id="successMessage">
YAYYYYY 💖  
Thank you for giving me a chance, Seleira.
</div>
</section>

<script>
/* LOADER */
window.onload = () => {
setTimeout(()=>{
document.getElementById("loader").classList.add("fade-out");
},2500);
};

/* GLOWING CURSOR */
const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

const trail=document.createElement("div");
trail.classList.add("trail");
trail.innerHTML="✨";
trail.style.left=e.clientX+"px";
trail.style.top=e.clientY+"px";

document.body.appendChild(trail);

setTimeout(()=>{
trail.remove();
},1000);
});

/* MOVING NO BUTTON */
const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
const x=Math.random()*200;
const y=Math.random()*100;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});

/* YES BUTTON */
function sayYes(){
document.getElementById("successMessage").style.display="block";
}
</script>

</body>
</html>
